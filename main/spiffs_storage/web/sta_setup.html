			<div class="steps">

					<form id="wifi_sta_config" method="POST" action="xhr">

						<div class="input-wrapper">
							<input list="ap_list" name="sta_ssid" type="text" placeholder="Access Point SSID" autocomplete="off" required/>
							<datalist id="ap_list"></datalist>
						</div>
						<div class="input-wrapper">
							<input name="sta_passphrase" type="password" placeholder="Passphrase" required/>
						</div>
						<button submit="submit" id="btn_set_sta_config">Continue</button>
						<div id="response"></div>
					</form>
				</div>
				<div class="step pending">Configure Server</div>
				<div class="step pending" id="last_step">Done</div>
			</div>

			<div id="refresh_timer">
				<div class="graph">
					<div class="bar-container">
						<div class="bar-usage" data-usage="50"></div>

		function start_refresh_timer()
		{
			const refresh_timer = document.getElementById("refresh_timer");
			refresh_timer.classList.add('active');

			setTimeout(() => {
				location.reload();
			}, 15000 );
		}

		document.getElementById("wifi_sta_config").addEventListener("submit", async (e) => {
			e.preventDefault();

			const form = e.target;
			const formData = new URLSearchParams(new FormData(form));

			const btn_submit = document.getElementById("btn_set_sta_config");
			const response_dom = document.getElementById("response");
			const step_indicator = document.getElementById("active_step");

			try {
				btn_submit.disabled = true;
				btn_submit.textContent = "Connecting...";
				step_indicator.classList.remove("active");
				step_indicator.classList.add("working");

				const response = await fetch( form.action, {
					method: form.method,
					headers: {
						"Content-Type": "application/x-www-form-urlencoded"
					},
					body: formData.toString()
				});

				if ( !response.ok )
					throw new Error(`HTTP error ${response.status}`);

				const result = await response.json();

				if ( typeof result.status === 'undefined')
					throw new Error('result status is undefined');

				if ( result.status.flag != 'success')
					throw new Error(`${response.status.message}`);

				btn_submit.remove();

				// set reponse
				response_dom.setAttribute('class', '');
				response_dom.classList.add("success");
				response_dom.innerText = result.status.message;

				// change step indicator to done
				step_indicator.classList.remove("working");
				step_indicator.classList.add("done");

				// start refresh timer
				start_refresh_timer();
			}
			catch (error) {
				console.error("Error:", error);
				btn_submit.disabled = false;
				btn_submit.textContent = "Retry";

				// set reponse
				response_dom.setAttribute('class', '');
				response_dom.classList.add("error");
				response_dom.innerText = "Error occurred";
			}
		});
	</script>
