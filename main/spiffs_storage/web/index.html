<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>

<style>
	* {
		background: #f1f1f1;
		box-sizing: border-box;
	}
	.form-wrapper {
		width: 80%;
		max-width:350px;
		position: absolute;
		transform: translateX(-50%);
		left:50%;
		top: 50px;
		min-height:500px;
	}
		.form-container {
			width: 100%;
			height: 100%;
			border: 1px solid #636363;
			border-radius: 10px;
			overflow: hidden;
			padding: 2em;
		}
		.form-container .icon-wrapper {
			display: block;
			text-align: center;
		}
		.form-container .icon-wrapper > svg {
			width:6em;
		}
		.form-container form#wifi_connect {

		}
			.form-container form#wifi_connect .input-wrapper {
				margin-top:1em;
			}
			.form-container form#wifi_connect .input-wrapper > input {
				background: #fff;
				border: 1px solid #000;
				line-height: 2.2em;
				padding-left: 15px;
				width: 100%;
			}
			.form-container form#wifi_connect #btn_connect {
				margin-top:1em;
				background: transparent;
				border: 2px solid #000;
				border-radius: 2.2em;
				line-height: 2.2em;
				padding:0 2em;
				cursor:pointer;
			}
</style>
</head>
<body>

<div class="form-wrapper">
	<div class="form-container">
		<div class="icon-wrapper">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 160C229.1 160 146.8 196 86.3 254.6C73.6 266.9 53.3 266.6 41.1 253.9C28.9 241.2 29.1 220.9 41.8 208.7C113.7 138.9 211.9 96 320 96C428.1 96 526.3 138.9 598.3 208.7C611 221 611.3 241.3 599 253.9C586.7 266.5 566.4 266.9 553.8 254.6C493.2 196 410.9 160 320 160zM272 496C272 469.5 293.5 448 320 448C346.5 448 368 469.5 368 496C368 522.5 346.5 544 320 544C293.5 544 272 522.5 272 496zM200 390.2C188.3 403.5 168.1 404.7 154.8 393C141.5 381.3 140.3 361.1 152 347.8C193 301.4 253.1 272 320 272C386.9 272 447 301.4 488 347.8C499.7 361.1 498.4 381.3 485.2 393C472 404.7 451.7 403.4 440 390.2C410.6 356.9 367.8 336 320 336C272.2 336 229.4 356.9 200 390.2z"/></svg>
		</div>
		<form id="wifi_connect" method="POST" action="xhr">
			<input name="setup_wifi" type="hidden">
			<div class="input-wrapper">
				<input name="SSID" type="text" placeholder="SSID" required/>
			</div>
			<div class="input-wrapper">
				<input name="passphrase" type="password" placeholder="Passphrase" required/>
			</div>
			<button submit="btn_submit" id="btn_connect">Connect</button>
		</form>
	</div>
</div>

<script>
	document.getElementById("wifi_connect").addEventListener("submit", async (e) => {
		e.preventDefault();

		const form = e.target;
		const formData = new FormData(form);

		const btn_submit = document.getElementById("btn_connect");
		
		try {
			
			btn_submit.disabled = true;
			btn_submit.textContent = "Connecting...";
			
			const response = await fetch( form.action, {
			  method: form.method,
			  body: formData
			});

			/*
			const data = {
				SSID: form.SSID.value,
				passphrase: form.passphrase.value
			};

			fetch("/wifi_connect", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(data)
			});
			*/
			
			if (!response.ok) {
			  throw new Error(`HTTP error ${response.status}`);
			}

			//const result = await response.text();
			const result = await response.json();

			console.log("Success:", result);
			if (result.connected == true){
				btn_submit.disabled = false;
				btn_submit.textContent = "CONNECTED";
			}
			else{
				btn_submit.disabled = false;
				btn_submit.textContent = "Reconnect";	
			}

		}
		catch (error) {
			console.error("Error:", error);
			btn_submit.textContent = "Unrecoverable error occurred";
		}
	});
</script>
	
</body>
</html>
