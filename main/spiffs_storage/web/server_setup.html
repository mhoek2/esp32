<!DOCTYPE html>
<html>
<head>    
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>ESP32 Configure Server</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
	<div class="backgorund">
		<div class="disc disc1"></div>
		<div class="disc disc2"></div>
		<div class="disc disc3"></div>
	</div>

	<div class="status_bar">
		<div>
			<div class="icon">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 160C229.1 160 146.8 196 86.3 254.6C73.6 266.9 53.3 266.6 41.1 253.9C28.9 241.2 29.1 220.9 41.8 208.7C113.7 138.9 211.9 96 320 96C428.1 96 526.3 138.9 598.3 208.7C611 221 611.3 241.3 599 253.9C586.7 266.5 566.4 266.9 553.8 254.6C493.2 196 410.9 160 320 160zM272 496C272 469.5 293.5 448 320 448C346.5 448 368 469.5 368 496C368 522.5 346.5 544 320 544C293.5 544 272 522.5 272 496zM200 390.2C188.3 403.5 168.1 404.7 154.8 393C141.5 381.3 140.3 361.1 152 347.8C193 301.4 253.1 272 320 272C386.9 272 447 301.4 488 347.8C499.7 361.1 498.4 381.3 485.2 393C472 404.7 451.7 403.4 440 390.2C410.6 356.9 367.8 336 320 336C272.2 336 229.4 356.9 200 390.2z"/></svg>
			</div>
			<div class="status" id="sta_status">-</div>
		</div>
	</div>

	<div class="form-wrapper">
		<div class="form-container">
			<div class="icon-wrapper">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.1.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M160 96C124.7 96 96 124.7 96 160L96 224C96 259.3 124.7 288 160 288L480 288C515.3 288 544 259.3 544 224L544 160C544 124.7 515.3 96 480 96L160 96zM376 168C389.3 168 400 178.7 400 192C400 205.3 389.3 216 376 216C362.7 216 352 205.3 352 192C352 178.7 362.7 168 376 168zM432 192C432 178.7 442.7 168 456 168C469.3 168 480 178.7 480 192C480 205.3 469.3 216 456 216C442.7 216 432 205.3 432 192zM160 352C124.7 352 96 380.7 96 416L96 480C96 515.3 124.7 544 160 544L480 544C515.3 544 544 515.3 544 480L544 416C544 380.7 515.3 352 480 352L160 352zM376 424C389.3 424 400 434.7 400 448C400 461.3 389.3 472 376 472C362.7 472 352 461.3 352 448C352 434.7 362.7 424 376 424zM432 448C432 434.7 442.7 424 456 424C469.3 424 480 434.7 480 448C480 461.3 469.3 472 456 472C442.7 472 432 461.3 432 448z"/></svg>
			</div>

			<div class="steps">
				<div class="step done" id="step_setup_wifi">Setup WiFi</div>
				<div class="step working" id="step_connect_wifi">Connecting to WiFi</div>
				<div class="step pending" id="step_configure_server">Configure Server</div>
				<div class="step content">
					<form id="server_config" method="POST" action="xhr">
						<input name="mode" value="set_server_ip" type="hidden">
						<div class="input-wrapper">
							<input name="server_ip" type="text" placeholder="192.168.1.1" autocomplete="on" required/>
						</div>
						<button submit="submit" id="btn_set_server_config">Continue</button>
						<div id="response"></div>
					</form>
				</div>
				<div class="step pending" id="last_step">Done</div>
			</div>

			<div id="factory_reset">Factory reset</div>

			<div id="refresh_timer">
				<div class="graph">
					<div class="bar-container">
						<div class="bar-usage" data-usage="50"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="/global.js" defer></script>
	<script>
		document.getElementById("factory_reset").addEventListener("click", async (e) => {
			try {
				const response = await fetch( "factory_reset", {
					method: "GET"
				});

				if ( !response.ok )
					throw new Error(`HTTP error ${response.status}`);

				const result = await response.json();

				if ( result.status.flag == 'success'){
					alert("Wait for the device to finish reboothing")
				}
			}
			catch (error) {
				console.error("Error:", error);
			}
		});

		function start_refresh_timer()
		{
			const refresh_timer = document.getElementById("refresh_timer");
			refresh_timer.classList.add('active');

			setTimeout(() => {
				location.reload();
			}, 15000 );
		}

		let last_wifi_sta_state = null;
		function watch_wifi_sta_status()
		{
			setInterval(() => {
				if (typeof _device_status === "undefined")
					return;

				if (typeof _device_status.wifi_sta_connected === "undefined")
					return;

				if (last_wifi_sta_state === _device_status.wifi_sta_connected)
					return;

				last_wifi_sta_state = _device_status.wifi_sta_connected;

				if (_device_status.wifi_sta_connected === true) {
					set_ui_step( "step_connect_wifi", "done" );
					set_ui_step( "step_configure_server", "active" );
				}
			}, 1000);
		}
		watch_wifi_sta_status();

		document.getElementById("server_config").addEventListener("submit", async (e) => {
			e.preventDefault();

			const form = e.target;
			const formData = new URLSearchParams(new FormData(form));

			const btn_submit = document.getElementById("btn_set_server_config");
			const response_dom = document.getElementById("response");
			const step_indicator = document.getElementById("step_configure_server");
			const last_step_indicator = document.getElementById("last_step");

			try {
				btn_submit.disabled = true;
				btn_submit.textContent = "Connecting...";
				set_ui_step( "step_configure_server", "working");

				const response = await fetch( form.action, {
					method: form.method,
					headers: {
						"Content-Type": "application/x-www-form-urlencoded"
					},
					body: formData.toString()
				});

				if ( !response.ok )
					throw new Error(`HTTP error ${response.status}`);

				const result = await response.json();

				if ( typeof result.status === 'undefined')
					throw new Error('result status is undefined');

				if ( result.status.flag != 'success'){
					throw new Error(result.status.message);
				}

				btn_submit.remove();

				// set reponse
				response_dom.setAttribute('class', '');
				response_dom.classList.add("success");
				response_dom.innerText = result.status.message;

				// change step indicator to done
				set_ui_step( "step_configure_server", "done");
				set_ui_step( "last_step", "done");

				// start refresh timer
				start_refresh_timer();
			}
			catch (error) {
				console.error("Error:", error);
				btn_submit.disabled = false;
				btn_submit.textContent = "Retry";

				// set reponse
				response_dom.setAttribute('class', '');
				response_dom.classList.add("error");
				response_dom.innerText = "Error occurred";
			}
		});
	</script>
	
</body>
</html>
