<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta charset="UTF-8">
	<title>ESP32 - Overview</title>
    <link href="style.css" rel="stylesheet">

	<style>
		.options > div {
			margin:0.5em;
			cursor:pointer;
		}
	</style>
</head>

<body>
	<div class="backgorund">
		<div class="disc disc1"></div>
		<div class="disc disc2"></div>
		<div class="disc disc3"></div>
	</div>

	<div class="status_bar">
		<div>
			<div class="icon">

			<div class="status" id="sta_status"></div>
		</div>
	</div>

	<div class="form-wrapper">
		<div class="form-container">

			<div class="icon-wrapper">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M240 88C240 74.7 229.3 64 216 64C202.7 64 192 74.7 192 88L192 128C156.7 128 128 156.7 128 192L88 192C74.7 192 64 202.7 64 216C64 229.3 74.7 240 88 240L128 240L128 296L88 296C74.7 296 64 306.7 64 320C64 333.3 74.7 344 88 344L128 344L128 400L88 400C74.7 400 64 410.7 64 424C64 437.3 74.7 448 88 448L128 448C128 483.3 156.7 512 192 512L192 552C192 565.3 202.7 576 216 576C229.3 576 240 565.3 240 552L240 512L296 512L296 552C296 565.3 306.7 576 320 576C333.3 576 344 565.3 344 552L344 512L400 512L400 552C400 565.3 410.7 576 424 576C437.3 576 448 565.3 448 552L448 512C483.3 512 512 483.3 512 448L552 448C565.3 448 576 437.3 576 424C576 410.7 565.3 400 552 400L512 400L512 344L552 344C565.3 344 576 333.3 576 320C576 306.7 565.3 296 552 296L512 296L512 240L552 240C565.3 240 576 229.3 576 216C576 202.7 565.3 192 552 192L512 192C512 156.7 483.3 128 448 128L448 88C448 74.7 437.3 64 424 64C410.7 64 400 74.7 400 88L400 128L344 128L344 88C344 74.7 333.3 64 320 64C306.7 64 296 74.7 296 88L296 128L240 128L240 88zM224 192L416 192C433.7 192 448 206.3 448 224L448 416C448 433.7 433.7 448 416 448L224 448C206.3 448 192 433.7 192 416L192 224C192 206.3 206.3 192 224 192zM240 240L240 400L400 400L400 240L240 240z"/></svg>
			</div>

			<div class="options">
				<div id="factory_reset">Factory reset</div>
				<div id="reboot_device">Reboot device</div>
				<div id="disable_ap">Disable AP</div>
			</div>

			<div id="refresh_timer">
				<div class="graph">
					<div class="bar-container">
						<div class="bar-usage" data-usage="50"></div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="/global.js" defer></script>
	<script>
		function start_refresh_timer()
		{
			const refresh_timer = document.getElementById("refresh_timer");
			refresh_timer.classList.add('active');

			setTimeout(() => {
				location.reload();
			}, 15000 );
		}
		
		document.getElementById("disable_ap").addEventListener("click", async (e) => {
			try {
				const response = await fetch( "disable_ap", {
					method: "GET"
				});

				if (!response.ok) {
					throw new Error(`HTTP error ${response.status}`);
				}

				const result = await response.json();
				console.log(result);

				if ( result.status.flag == 'success'){
					// start refresh timer
					start_refresh_timer();
				}
			}
			catch (error) {
				console.error("Error:", error);
			}
		});

		document.getElementById("factory_reset").addEventListener("click", async (e) => {
			try {
				const response = await fetch( "factory_reset", {
					method: "GET"
				});

				if (!response.ok) {
					throw new Error(`HTTP error ${response.status}`);
				}

				const result = await response.json();
				console.log(result);

				if ( result.status.flag == 'success') {
					// start refresh timer
					start_refresh_timer();
				}
			}
			catch (error) {
				console.error("Error:", error);
			}
		});

		document.getElementById("reboot_device").addEventListener("click", async (e) => {
			try {
				const response = await fetch( "reboot_device", {
					method: "GET"
				});

				if (!response.ok) {
					throw new Error(`HTTP error ${response.status}`);
				}

				const result = await response.json();
				console.log(result);

				if ( result.status.flag == 'success') {
					// start refresh timer
					start_refresh_timer();
				}
			}
			catch (error) {
				console.error("Error:", error);
			}
		});
	</script>
</body>
</html>
