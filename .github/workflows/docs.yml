name: Build and Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  app-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'  # Adjust based on your project requirements
          tools: composer, phpstan

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
            composer install --prefer-dist
            npm install

      - name: Install Java (Required for SchemaSpy)
        run: sudo apt-get install -y openjdk-17-jre

      - name: Install Graphviz (Required for SchemaSpy Diagrams)
        run: sudo apt-get install -y graphviz

      - name: Download SchemaSpy
        run: wget https://github.com/schemaspy/schemaspy/releases/download/v6.2.4/schemaspy-6.2.4.jar -O schemaspy.jar

      - name: Install MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-server
          sudo systemctl start mysql
          sudo systemctl enable mysql

      - name: Install MySQL JDBC Driver
        run: |
          wget https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.4.0/mysql-connector-j-8.4.0.jar -O mysql-connector-java.jar        

      - name: Create MySQL Database
        run: |
          sudo mysql -uroot -proot -e "CREATE DATABASE tempdb;"

      - name: Import SQL Dump
        run: |
          sudo mysql -uroot -proot tempdb < sql/windowstate.sql

      - name: Run PHPStan and Generate JSON Report
        run: vendor/bin/phpstan analyse --error-format=json --no-progress --memory-limit=512M > phpstan-report.json || true

      - name: Upload PHPStan JSON Report
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-json-report
          path: phpstan-report.json 

      - name: Run ESLint
        run: |
          npx eslint "app/Views/**/*.php" --format json --output-file eslint-report.json || true

      - name: Run Stylelint
        run: |
          npx stylelint "app/Views/**/*.php" --formatter json --output-file stylelint-report.json || true 

      - name: Convert PHPStan JSON to RST
        run: |
            mkdir -p docs/report
            echo "PHPStan Report" > docs/report/phpstan.rst
            echo "==============" >> docs/report/phpstan.rst
            echo "" >> docs/report/phpstan.rst
            jq -r '
              .files | to_entries[] |
              "**" + (.key | gsub("/home/runner/work/windowstate/windowstate/"; "")) + "**\n" +
              "\n    .. code-block:: bash\n" +
              "\n" +
              (.value.messages | map("        Line " + (.line|tostring) + ": " + .message) | join("\n")) +
              "\n"
            ' phpstan-report.json >> docs/report/phpstan.rst

      - name: Convert ESLint JSON to RST
        run: |
            mkdir -p docs/report
            echo "ESLint Report" > docs/report/eslint.rst
            echo "==============" >> docs/report/eslint.rst
            echo "" >> docs/report/eslint.rst
            jq -r '
              .[] | 
              if (.messages | length > 0) then
                "**" + (.filePath) + "**\n" +
                "\n    .. code-block:: bash\n" +
                "\n" +
                (.messages | map("        Line " + (.line|tostring) + ": " + .message) | join("\n")) +
                "\n"
              else
                ""
              end
            ' eslint-report.json >> docs/report/eslint.rst

      - name: Convert Stylelint JSON to RST
        run: |
            mkdir -p docs/report
            echo "Stylelint Report" > docs/report/stylelint.rst
            echo "==============" >> docs/report/stylelint.rst
            echo "" >> docs/report/stylelint.rst
            jq -r '
              .[] |
              if (.warnings | length > 0) then
                "**" + (.source) + "**\n" +
                "\n    .. code-block:: bash\n" +
                "\n" +
                (.warnings | map("        Line " + (.line|tostring) + ", Column " + (.column|tostring) + ": " + .text) | join("\n")) +
                "\n"
              else
                ""
              end
            ' stylelint-report.json >> docs/report/stylelint.rst

      - name: Generate Documentation
        run: |
          vendor/bin/phpdoc -c phpdoc.xml

      - name: Run SchemaSpy
        run: |
          java -jar schemaspy.jar -t mysql -host 127.0.0.1 -port 3306 \
          -db tempdb -s tempdb -u root -p root -o docs/build/guide/report/schemaspy/ -dp mysql-connector-java.jar         

      - name: Run PHP Metrics
        run: |
          composer require --dev phpmetrics/phpmetrics:^v3.0.0rc8 -W
          vendor/bin/phpmetrics  --verbose --report-html=docs/build/guide/report/phpmetrics app/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./docs/build
          publish_branch: gh-pages

      - name: Create packages
        run: |
            7z a -r standalone.zip . -x!node_modules -x!.git -x!.github -x!.phpdoc -x!docs/build -x!*.zip -x!*.jar
            7z a -r core.zip . -x!vendor -x!node_modules -x!docs/build -x!.git -x!.github -x!.phpdoc -x!*.zip -x!*.jar

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            standalone.zip
            core.zip
         
  create-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [app-and-docs]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          
      - name: Create Release
        id: create_release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GH_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
          title: "Release"
          files: |
            standalone.zip
            core.zip