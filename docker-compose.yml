version: '3.8'
name: esp32-dashboard

services:

  app:
    build: .
    image: esp32_app
    container_name: esp32_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db

  webserver:
    image: nginx:latest
    container_name: esp32_nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: esp32_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: esp32_db
      MYSQL_USER: esp32_user
      MYSQL_PASSWORD: esp32_pass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # - ./sql/esp32.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: esp32_phpmyadmin
    restart: always
    #ports:
    #  - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      # comment URI and COOKIE when using dedicated ports above
      PMA_ABSOLUTE_URI: http://localhost/phpmyadmin/
      PMA_COOKIE_SECURE: 0
    depends_on:
      - db

volumes:
  dbdata:
