version: "3.8"
name: esp32-firmware

services:

  app:
    build: .
    image: esp32-firmware_app
    container_name: esp32-firmware_app
    working_dir: /var/www
    volumes:
      - ./main/spiffs_storage/web/:/var/www

  webserver:
    image: nginx:latest
    container_name: esp32-firmware_nginx
    ports:
      - "3000:80"
    volumes:
      - ./main/spiffs_storage/web/:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app